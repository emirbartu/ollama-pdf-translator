<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ollama PDF Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 0 0 .42-8.98 6.5 6.5 0 0 0-12.7 1.61A4 4 0 0 0 6 19z"/></svg>
        Powered by Ollama Cloud
      </div>
      <h1>Ollama <span class="accent">PDF Translator</span></h1>
      <p class="pitch">Translate PDFs with a cloud LLM — layout and graphics preserved.</p>
    </header>

    <section class="card">
      <form id="upload-form" onsubmit="return startTranslation(event)">
        <label id="dropzone" for="file-input">
          <input id="file-input" name="file" type="file" accept="application/pdf" required />
          <svg class="dz-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
          <span id="dz-text" class="dz-text">Drop your PDF here or <span class="dz-browse">browse</span></span>
          <span class="dz-hint">PDF only · max 10 pages · max 3 MB</span>
        </label>

        <div class="fields">
          <div class="field">
            <label for="source_lang">Source language</label>
            <input id="source_lang" name="source_lang" type="text" value="English" required />
          </div>
          <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          <div class="field">
            <label for="target_lang">Target language</label>
            <input id="target_lang" name="target_lang" type="text" value="Turkish" required />
          </div>
        </div>

        <label class="checkbox">
          <input type="checkbox" name="preserve_layout" checked />
          <span>Preserve original layout</span>
        </label>

        <button type="submit" class="submit">Translate</button>
      </form>

      <div id="status"></div>
    </section>

    <footer class="footer">
      Model: gpt-oss:120b via Ollama Cloud · Max 10 pages / 3 MB · 5 translations per hour
    </footer>
  </main>

  <script>
    const dz = document.getElementById('dropzone');
    const input = document.getElementById('file-input');
    const dzText = document.getElementById('dz-text');
    const form = document.getElementById('upload-form');
    const statusEl = document.getElementById('status');

    function showName() {
      if (input.files.length) {
        dzText.textContent = input.files[0].name;
        dz.classList.add('has-file');
      }
    }

    input.addEventListener('change', showName);
    ['dragenter', 'dragover'].forEach(e => dz.addEventListener(e, ev => {
      ev.preventDefault();
      dz.classList.add('dragover');
    }));
    ['dragleave', 'drop'].forEach(e => dz.addEventListener(e, ev => {
      ev.preventDefault();
      dz.classList.remove('dragover');
    }));
    dz.addEventListener('drop', ev => {
      if (ev.dataTransfer.files.length) {
        input.files = ev.dataTransfer.files;
        showName();
      }
    });

    function runningCard() {
      return '<div class="status running">' +
        '<div class="status-row"><span class="spinner"></span>' +
        '<span class="status-title">Translating ' + (input.files[0] ? input.files[0].name : 'PDF') + '</span></div>' +
        '<div class="progress"><div class="progress-fill" id="pfill" style="width: 0%"></div></div>' +
        '<div class="status-sub" id="psub">Starting…</div></div>';
    }

    function showError(msg) {
      statusEl.innerHTML = '<div class="status error"><div class="status-row">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '<span class="status-title"></span></div></div>';
      statusEl.querySelector('.status-title').textContent = msg;
    }

    function handleEvent(ev) {
      if (ev.type === 'progress') {
        const fill = document.getElementById('pfill');
        const sub = document.getElementById('psub');
        if (fill) fill.style.width = ev.percent + '%';
        if (sub) sub.textContent = 'Page ' + ev.page + ' of ' + ev.total + ' · ' + ev.percent + '%';
      } else if (ev.type === 'done') {
        const bin = atob(ev.pdf_b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const url = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
        statusEl.innerHTML = '<div class="status done"><div class="status-row">' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
          '<span class="status-title">Translation complete</span></div>' +
          '<a class="download" id="dl" href="' + url + '" download="' + ev.filename + '">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
          'Download translated PDF</a></div>';
        document.getElementById('dl').click();
      } else if (ev.type === 'error') {
        showError(ev.message);
      }
    }

    async function startTranslation(e) {
      e.preventDefault();
      if (!input.files.length) return false;
      statusEl.innerHTML = runningCard();
      try {
        const res = await fetch('/translate', { method: 'POST', body: new FormData(form) });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buffer.indexOf('\n')) >= 0) {
            const line = buffer.slice(0, idx).trim();
            buffer = buffer.slice(idx + 1);
            if (line) handleEvent(JSON.parse(line));
          }
        }
        const tail = buffer.trim();
        if (tail) handleEvent(JSON.parse(tail));
      } catch (err) {
        showError('Network error — please try again.');
      }
      return false;
    }
  </script>
</body>
</html>
